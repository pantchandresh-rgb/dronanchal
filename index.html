<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dronanchal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Fast Drone Delivery in Remote Areas of Uttarakhand</h1>
    <p>Medicines and essentials delivered in minutes.</p>
    <a href="#form" class="btn">Request Delivery</a>
    <a href="https://wa.me/91XXXXXXXXXX" class="btn">WhatsApp</a>
  </div>
</header>

<section>
  <h2>How It Works</h2>
  <div class="grid">
    <div class="card">Request</div>
    <div class="card">Assign Pilot</div>
    <div class="card">Delivery</div>
  </div>
</section>

<section id="form">
  <h2>Request Delivery</h2>
  <form>
    <input placeholder="Name">
    <input placeholder="Phone">
    <input placeholder="Pickup">
    <input placeholder="Delivery">
    <textarea placeholder="Details"></textarea>
    <button class="btn">Submit</button>
  </form>
</section>

<footer>
  <p>Dronanchal</p>
</footer>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
